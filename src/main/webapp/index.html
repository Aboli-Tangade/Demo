<!DOCTYPE html>
<html>
<head>
    <title>SkillSwap Hub</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .register {
            background: #28a745;
        }

        .login {
            background: #007bff;
        }

        .users {
            background: #ff9800;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

    </style>
</head>

<body>

<div class="container">

    <h1>SkillSwap Hub</h1>
    <p>Exchange Skills. Learn Together.</p>

    <a href="register" class="btn register">Register</a>
    <a href="login" class="btn login">Login</a>
    <a href="users" class="btn users">All Users</a>

</div>

</body>
</html>
